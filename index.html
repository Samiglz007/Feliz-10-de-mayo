<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Especial - 10 de Mayo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Contenedor para la lluvia de flores -->
    <div id="petals-container"></div>

    <div class="login-card">

        <div class="floral-header">
            <span class="flower-icon">🌸</span>
            <h1>¡Feliz Día, Mamá!</h1>
            <p>Ingresa para ver tu sorpresa especial</p>
        </div>

        <form onsubmit="event.preventDefault(); login();">

            <div class="input-group">
                <input type="text" id="usuario" required autocomplete="off">
                <label>Nombre de usuario</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" required>
                <label>Contraseña mágica</label>
            </div>

            <p id="error"></p>

            <button type="submit" class="btn-floral">
                Entrar con amor
            </button>

        </form>

    </div>

    <!-- MÚSICA DE FONDO -->
    <audio id="musica" autoplay loop hidden>
        <source src="musica/cancion.mp3" type="audio/mp3">
    </audio>

    <!-- SCRIPT PRINCIPAL -->
    <script src="script.js"></script>

    <!-- SCRIPT DE MÚSICA -->
    <script>

        const musica = document.getElementById("musica");

        // Recuperar tiempo guardado
        window.addEventListener("load", () => {

            const tiempoGuardado = localStorage.getItem("musicaTiempo");

            if (tiempoGuardado) {
                musica.currentTime = parseFloat(tiempoGuardado);
            }

            musica.play();

        });

        // Guardar tiempo actual
        setInterval(() => {

            localStorage.setItem("musicaTiempo", musica.currentTime);

        }, 1000);

    </script>

</body>
</html>
