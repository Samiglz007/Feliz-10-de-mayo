<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Yuli 💖</title>
    <link rel="stylesheet" href="yulissa.css">
</head>
<body>

<div class="main-container">
    <div class="book-wrapper" id="book-container">
        <!-- Controles de las hojas -->
        <input type="checkbox" id="c1">
        <input type="checkbox" id="c2">
        <input type="checkbox" id="c3">
        <input type="checkbox" id="c4">
        <input type="checkbox" id="c5">
        <input type="checkbox" id="c6">
        <input type="checkbox" id="c7">

        <div class="book">
            
            <!-- HOJA 1: PORTADA -->
            <div class="page" id="p1">
                <label class="front cover-cafe" for="c1">
                    <div class="etiqueta-titulo">
                        <h1>Para Yuli</h1>
                    </div>
                </label>
                <div class="back page-crema">
                    <!-- Foto inicial a la izquierda -->
                    <div class="photo-frame"><img src="/Fotos/ym.jpg"></div>
                </div> 
            </div>

            <!-- HOJA 2: BLANCO -> PÁRRAFO 1 -->
            <div class="page" id="p2">
                <label class="front page-crema" for="c2"></label>
                <label class="back page-crema" for="c1">
                    <div class="content">
                        <p><span class="capitular">Q</span>uerida Yuli, en este 10 de mayo, no quería dejar pasar la oportunidad de enviarte un saludo sincero desde el corazón.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 3: PÁRRAFO 2 -> PÁRRAFO 3 -->
            <div class="page" id="p3">
                <label class="front page-crema" for="c3">
                    <div class="content">
                        <p>Aunque todavía no nos conocemos al cien por ciento, hay algo en tu forma de ser que me transmite muchísima confianza y tranquilidad.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c2">
                    <div class="content">
                        <p>Sé que eres una persona de gran corazón y siento que, si en algún momento necesitara un consejo, tú estarías ahí para tenderme la mano.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 4: PÁRRAFO 4 -> PÁRRAFO 5 -->
            <div class="page" id="p4">
                <label class="front page-crema" for="c4">
                    <div class="content">
                        <p>Esa disposición de ayudar y esa buena energía que proyectas son cualidades que admiro mucho en ti y agradezco tenerte cerca.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c3">
                    <div class="content">
                        <p>Te celebro hoy como la gran mujer y madre que eres, deseando que pases un día maravilloso rodeada de mucho amor y alegría.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 5: PÁRRAFO 6 -> PÁRRAFO 7 -->
            <div class="page" id="p5">
                <label class="front page-crema" for="c5">
                    <div class="content">
                        <p>Espero que la vida nos dé más tiempo para seguir compartiendo y para que esta conexión tan especial siga creciendo día con día.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c4">
                    <div class="content">
                        <p>¡Feliz Día de las Madres! Te mereces lo mejor hoy y siempre por ser una persona tan excepcional y cálida.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 6: CIERRE -> FRASE DESPEDIDA -->
            <div class="page" id="p6">
                <label class="front page-crema" for="c6">
                    <div class="content">
                        <p>Gracias por tu buena vibra. Disfruta mucho tu día con los tuyos. ¡Muchas felicidades!</p>
                    </div>
                </label>
                <label class="back page-crema" for="c5">
                    <div class="content">
                        <p class="final-izquierda">¡Te quiero muchísimo! 💖</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 7: FOTO FINAL -->
            <div class="page" id="p7">
                <label class="front cover-cafe" for="c7">
                    <img src="/Fotos/ym.jpg" alt="Foto Final">
                </label>
                <label class="back page-crema" for="c6"></label>
            </div>

        </div>
    </div>

    <!-- BOTONES -->
    <div class="button-controls">
        <button id="prev-btn">Anterior</button>
        <button id="next-btn">Siguiente</button>
    </div>
</div>

<script src="yulissa.js"></script>
</body>
</html>
