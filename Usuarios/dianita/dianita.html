<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Dianita 💖</title>
    <link rel="stylesheet" href="dianita.css">
</head>
<body>

<div class="main-container">
    <div class="book-wrapper" id="book-container">
        <!-- 7 Checkboxes para las 7 hojas -->
        <input type="checkbox" id="c1">
        <input type="checkbox" id="c2">
        <input type="checkbox" id="c3">
        <input type="checkbox" id="c4">
        <input type="checkbox" id="c5">
        <input type="checkbox" id="c6">
        <input type="checkbox" id="c7">

        <div class="book">
            
            <!-- HOJA 1: PORTADA -->
            <div class="page" id="p1">
                <label class="front cover-cafe" for="c1">
                    <div class="etiqueta-titulo">
                        <h1>Para Dianita</h1>
                    </div>
                </label>
                <div class="back page-crema">
                    <!-- Foto inicial a la izquierda -->
                    <div class="photo-frame"><img src="/Fotos/Dxolapa.jpeg"></div>
                </div> 
            </div>

            <!-- HOJA 2: BLANCO -> PÁRRAFO 1 -->
            <div class="page" id="p2">
                <label class="front page-crema" for="c2"></label>
                <label class="back page-crema" for="c1">
                    <div class="content">
                        <p><span class="capitular">Q</span>uerida Dianita, hoy, en este 10 de mayo, quería darte las gracias por todo lo que haces por mí. Este mensaje es pequeño comparado con todo lo que significas.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 3: PÁRRAFO 2 -> PÁRRAFO 3 -->
            <div class="page" id="p3">
                <label class="front page-crema" for="c3">
                    <div class="content">
                        <p>Desde siempre has estado a mi lado, brindándome tu apoyo, tu cariño y tu paciencia. No importa la situación, siempre encuentro en ti un lugar seguro.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c2">
                    <div class="content">
                        <p>Quiero aprovechar este momento para decirte cuánto te valoro y lo importante que eres para mí. Eres una guía y una fuerza que me impulsa.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 4: PÁRRAFO 4 -> PÁRRAFO 5 -->
            <div class="page" id="p4">
                <label class="front page-crema" for="c4">
                    <div class="content">
                        <p>Tu amor es algo que no tiene comparación. Es constante, sincero, fuerte e incondicional. Gracias por cada palabra que me ayuda a levantarme.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c3">
                    <div class="content">
                        <p>Gracias por cada abrazo que me ha dado tranquilidad y por cada esfuerzo que has hecho, incluso cuando nadie más lo veía.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 5: PÁRRAFO 6 -> PÁRRAFO 7 -->
            <div class="page" id="p5">
                <label class="front page-crema" for="c5">
                    <div class="content">
                        <p>Sé que muchas veces no es fácil, que ser mamá implica sacrificios y cansancio, pero aún así siempre das lo mejor de ti.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c4">
                    <div class="content">
                        <p>Eso es algo que admiro profundamente de ti, porque demuestra la gran persona que eres. Tu entrega es infinita.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 6: CIERRE -> FRASE DESPEDIDA -->
            <div class="page" id="p6">
                <label class="front page-crema" for="c6">
                    <div class="content">
                        <p>Gracias por todo. Te quiero muchísimo y siempre estaré agradecido por tenerte. ¡Feliz Día de las Madres!</p>
                    </div>
                </label>
                <label class="back page-crema" for="c5">
                    <div class="content">
                        <p class="final-izquierda">¡Te quiero muchísimo! 💖</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 7: FOTO FINAL -->
            <div class="page" id="p7">
                <label class="front cover-cafe" for="c7">
                    <img src="/Fotos/Dxolapa.jpeg" alt="Foto Final">
                </label>
                <label class="back page-crema" for="c6"></label>
            </div>

        </div>
    </div>

    <div class="button-controls">
        <button id="prev-btn">Anterior</button>
        <button id="next-btn">Siguiente</button>
    </div>
</div>

<script src="dianita.js"></script>
</body>
</html>
