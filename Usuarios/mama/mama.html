<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro para Mamá 💖</title>
    <link rel="stylesheet" href="mama.css">
</head>
<body>

<div class="main-container">

    <div class="book-wrapper" id="book-container">

        <input type="checkbox" id="c1">
        <input type="checkbox" id="c2">
        <input type="checkbox" id="c3">
        <input type="checkbox" id="c4">
        <input type="checkbox" id="c5">
        <input type="checkbox" id="c6">
        <input type="checkbox" id="c7">

        <div class="book">

            <div class="page" id="p1">
                <label class="front cover-cafe" for="c1">
                    <div class="etiqueta-titulo">
                        <h1>Feliz día Mamá</h1>
                    </div>
                </label>
                <div class="back page-crema"></div>
            </div>

            <div class="page" id="p2">
                <label class="front page-crema" for="c2">
                    <div class="photo-frame">
                        <img src="./mama.jpeg?v=1" alt="Mamá">
                    </div>
                </label>
                <label class="back page-crema" for="c1">
                    <div class="content">
                        <p>
                            <span class="capitular">G</span>
                            racias por todo lo que haces por mí.
                            Este mensaje es pequeño comparado con
                            todo lo que significas.
                        </p>
                    </div>
                </label>
            </div>

            <div class="page" id="p3">
                <label class="front page-crema" for="c3">
                    <div class="content">
                        <p>
                            Tu amor es algo que no tiene comparación.
                            Es constante, sincero, fuerte e incondicional.
                            Gracias por cada abrazo.
                        </p>
                    </div>
                </label>
                <label class="back page-crema" for="c2">
                    <div class="content">
                        <p>
                            Desde siempre has estado a mi lado,
                            en los momentos buenos y difíciles,
                            brindándome tu apoyo y paciencia.
                        </p>
                    </div>
                </label>
            </div>

            <div class="page" id="p4">
                <label class="front page-crema" for="c4">
                    <div class="content">
                        <p>
                            Gracias por enseñarme valores,
                            por ayudarme a crecer y por nunca
                            soltar mi mano.
                            Todo lo que soy es por ti.
                        </p>
                    </div>
                </label>
                <label class="back page-crema" for="c3">
                    <div class="content">
                        <p>
                            Sé que ser mamá implica sacrificios
                            y cansancio, pero siempre das lo mejor de ti.
                            Eso lo admiro profundamente.
                        </p>
                    </div>
                </label>
            </div>

            <div class="page" id="p5">
                <label class="front page-crema" for="c5">
                    <div class="content">
                        <p>
                            Hoy quiero que sepas que todo ese amor
                            que das también regresa a ti.
                            Te mereces tranquilidad y felicidad.
                        </p>
                    </div>
                </label>
                <label class="back page-crema" for="c4">
                    <div class="content">
                        <p>
                            Eres una persona increíble, fuerte y valiente.
                            Tu forma de estar presente hace una diferencia enorme.
                        </p>
                    </div>
                </label>
            </div>

            <div class="page" id="p6">
                <label class="front page-crema" for="c6">
                    <div class="content">
                        <p>
                            Gracias por ser mi mamá y por todo lo que haces día con día.
                            Siempre llevaré conmigo todo lo que me has enseñado.
                        </p>
                    </div>
                </label>
                <label class="back page-crema" for="c5">
                    <div class="content">
                        <p class="final-izquierda">
                            Con todo mi amor... 💖
                        </p>
                    </div>
                </label>
            </div>

            <div class="page" id="p7">
                <label class="front cover-cafe" for="c7">
                    <div class="photo-frame">
                        <img src="./mama.jpeg?v=2" alt="Mamá">
                    </div>
                </label>
                <label class="back page-crema" for="c6"></label>
            </div>

        </div>
    </div>

    <div class="button-controls">
        <button id="prev-btn">Anterior</button>
        <button id="next-btn">Siguiente</button>
    </div>

</div>

<script src="mama.js"></script>

</body>
</html>
