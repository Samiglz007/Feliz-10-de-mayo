<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro para Mamá 💖</title>
    <link rel="stylesheet" href="mama.css">
</head>
<body>

<div class="main-container">
    <div class="book-wrapper" id="book-container">
        <input type="checkbox" id="c1">
        <input type="checkbox" id="c2">
        <input type="checkbox" id="c3">
        <input type="checkbox" id="c4">
        <input type="checkbox" id="c5">
        <input type="checkbox" id="c6">
        <input type="checkbox" id="c7">

        <div class="book">
            <div class="page" id="p1">
                <label class="front cover-cafe" for="c1">
                    <div class="etiqueta-titulo">
                        <h1>Feliz día Mamá</h1>
                    </div>
                </label>
                <div class="back page-crema"></div>
            </div>

            <div class="page" id="p2">
                <label class="front page-crema" for="c2">
                    <div class="photo-frame">
                        <img src="./mama.jpeg" alt="Mamá">
                    </div>
                </label>
                <div class="back page-crema"></div>
            </div>

            <div class="page" id="p7">
                <label class="front cover-cafe" for="c7">
                    <div class="photo-frame">
                        <img src="./mama.jpeg" alt="Mamá">
                    </div>
                </label>
                <label class="back page-crema" for="c6"></label>
            </div>
        </div>
    </div>
</div>

<script src="mama.js"></script>
</body>
</html>
