<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nery 💖</title>
    <link rel="stylesheet" href="nery.css">
</head>
<body>

<div class="main-container">
    <div class="book-wrapper" id="book-container">
        <!-- Controles de las hojas -->
        <input type="checkbox" id="c1">
        <input type="checkbox" id="c2">
        <input type="checkbox" id="c3">
        <input type="checkbox" id="c4">
        <input type="checkbox" id="c5">
        <input type="checkbox" id="c6">
        <input type="checkbox" id="c7">

        <div class="book">
            
            <!-- HOJA 1: PORTADA -->
            <div class="page" id="p1">
                <label class="front cover-cafe" for="c1">
                    <div class="etiqueta-titulo">
                        <h1>Para Nery</h1>
                    </div>
                </label>
                <div class="back page-crema">
                    <!-- Foto inicial a la izquierda al abrir -->
                    <div class="photo-frame"><img src="./nery.jpeg"></div>
                </div> 
            </div>

            <!-- HOJA 2: BLANCO (DER) -> PÁRRAFO 1 (IZQ) -->
            <div class="page" id="p2">
                <label class="front page-crema" for="c2">
                    <!-- Lado derecho blanco al abrir -->
                </label>
                <label class="back page-crema" for="c1">
                    <div class="content">
                        <p><span class="capitular">Q</span>uerida Nery, en este día tan especial, no quería dejar de expresar mi más profundo agradecimiento y admiración.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 3: PÁRRAFO 2 (DER) -> PÁRRAFO 3 (IZQ) -->
            <div class="page" id="p3">
                <label class="front page-crema" for="c3">
                    <div class="content">
                        <p>Trabajar a su lado ha sido un privilegio; gracias por recibirme con los brazos abiertos y por ser esa pieza clave en mi crecimiento.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c2">
                    <div class="content">
                        <p>Verla trabajar con tanta dedicación y, al mismo tiempo, ser esa madre entregada y presente, es algo que me inspira profundamente.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 4: PÁRRAFO 4 (DER) -> PÁRRAFO 5 (IZQ) -->
            <div class="page" id="p4">
                <label class="front page-crema" for="c4">
                    <div class="content">
                        <p>Admiro la forma en la que equilibra su fuerza como líder con esa empatía y calidez que siempre la caracteriza. Gracias por confiar en mí.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c3">
                    <div class="content">
                        <p>Gracias por darme una nueva oportunidad, por sus enseñanzas diarias y por ser un ejemplo de que se puede ser una profesional brillante con corazón.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 5: PÁRRAFO 6 (DER) -> PÁRRAFO 7 (IZQ) -->
            <div class="page" id="p5">
                <label class="front page-crema" for="c5">
                    <div class="content">
                        <p>Espero que hoy sus hijos la llenen de mimos y que sienta todo el cariño que cosecha día a día con su entrega y dedicación.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c4">
                    <div class="content">
                        <p>Usted se merece un 10 de mayo maravilloso por ser la mujer extraordinaria que es, tanto en la oficina como en su hogar.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 6: PÁRRAFO FINAL (DER) -> FRASE DESPEDIDA (IZQ) -->
            <div class="page" id="p6">
                <label class="front page-crema" for="c6">
                    <div class="content">
                        <p>¡Muchas felicidades! Le deseo un día lleno de luz y alegrías rodeada de sus seres queridos. Gracias por todo.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c5">
                    <div class="content">
                        <p class="final-izquierda">¡Con todo mi cariño y gratitud! 💖</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 7: FOTO FINAL (DERECHA) -->
            <div class="page" id="p7">
                <label class="front cover-cafe" for="c7">
                    <img src="./nery.jpeg" alt="Foto Final">
                </label>
                <label class="back page-crema" for="c6"></label>
            </div>

        </div>
    </div>

    <!-- BOTONES -->
    <div class="button-controls">
        <button id="prev-btn">Anterior</button>
        <button id="next-btn">Siguiente</button>
    </div>
</div>

<script src="nery.js"></script>
</body>
</html>
