<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Yess 💖</title>
    <link rel="stylesheet" href="yesenia.css">
</head>
<body>

<div class="main-container">
    <div class="book-wrapper" id="book-container">
        <!-- Controles de las hojas -->
        <input type="checkbox" id="c1">
        <input type="checkbox" id="c2">
        <input type="checkbox" id="c3">
        <input type="checkbox" id="c4">
        <input type="checkbox" id="c5">
        <input type="checkbox" id="c6">
        <input type="checkbox" id="c7">

        <div class="book">
            
            <!-- HOJA 1: PORTADA -->
            <div class="page" id="p1">
                <label class="front cover-cafe" for="c1">
                    <div class="etiqueta-titulo">
                        <h1>Para Yess</h1>
                    </div>
                </label>
                <div class="back page-crema">
                    <div class="photo-frame"><img src="./yess.jpeg"></div>
                </div> 
            </div>

            <!-- HOJA 2: BLANCO -> PÁRRAFO 1 -->
            <div class="page" id="p2">
                <label class="front page-crema" for="c2"></label>
                <label class="back page-crema" for="c1">
                    <div class="content">
                        <p><span class="capitular">M</span>i querida Yess, hoy te escribo desde el rincón más honesto de mi alma. Madre también es quien te rescata del abismo y te sostiene cuando no puedes más.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 3: PÁRRAFO 2 -> PÁRRAFO 3 -->
            <div class="page" id="p3">
                <label class="front page-crema" for="c3">
                    <div class="content">
                        <p>Gracias por haber sido mi refugio en estos tiempos de tragedia. Cuando el dolor se sentía insoportable, ahí estuviste tú con tu fuerza y tu presencia.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c2">
                    <div class="content">
                        <p>Me has amado en mis peores momentos, y eso nunca lo voy a olvidar. Mi lealtad hacia ti es inquebrantable, porque mi confianza en ti es total.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 4: PÁRRAFO 4 -> PÁRRAFO 5 -->
            <div class="page" id="p4">
                <label class="front page-crema" for="c4">
                    <div class="content">
                        <p>Admiro tu firmeza y esa excelencia que imprimes en todo. Aunque a veces me cuesta seguirte el paso, cada regaño tuyo lo guardo como un tesoro que me pule.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c3">
                    <div class="content">
                        <p>Eres una mujer que siembra luz incluso donde hay sombras. Estaré agradecido contigo por siempre por darme una oportunidad y un hogar emocional.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 5: PÁRRAFO 6 -> PÁRRAFO 7 -->
            <div class="page" id="p5">
                <label class="front page-crema" for="c5">
                    <div class="content">
                        <p>Gracias por ser mi guía, mi maestra y la mamá que el corazón me permitió elegir. Te quiero con una profundidad que las palabras no alcanzan a tocar.</p>
                    </div>
                </label>
                <label class="back page-crema" for="c4">
                    <div class="content">
                        <p>Daría lo que fuera por que veas los frutos que has cosechado en mí. Soy el resultado de tu paciencia y de tu fe incondicional.</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 6: CIERRE -> FRASE FINAL -->
            <div class="page" id="p6">
                <label class="front page-crema" for="c6">
                    <div class="content">
                        <p>¡Feliz Día de las Madres, mi ángel guardián! Gracias por ser mi norte. 🤌🐷🤌🐷</p>
                    </div>
                </label>
                <label class="back page-crema" for="c5">
                    <div class="content">
                        <p class="final-izquierda">¡Te quiero por siempre! 💖</p>
                    </div>
                </label>
            </div>

            <!-- HOJA 7: FOTO FINAL -->
            <div class="page" id="p7">
                <label class="front cover-cafe" for="c7">
                    <img src="./yess.jpeg" alt="Foto Final">
                </label>
                <label class="back page-crema" for="c6"></label>
            </div>

        </div>
    </div>

    <div class="button-controls">
        <button id="prev-btn">Anterior</button>
        <button id="next-btn">Siguiente</button>
    </div>
</div>

<script src="yesenia.js"></script>
</body>
</html>
